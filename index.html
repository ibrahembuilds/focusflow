<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="FocusFlow brings tasks, focus sessions, planning, analytics, and AI-assisted breakdowns into one calm workspace." />
    <meta name="theme-color" content="#f4f7f5" />
    <link rel="icon" type="image/png" href="/brand/focusflow-logo.png" />
    <script>
      try {
        const saved = JSON.parse(localStorage.getItem('focusflow-storage') || '{}');
        const theme = saved.state?.theme === 'dark' ? 'dark' : 'light';
        const allowedAccents = ['forest', 'ocean', 'violet', 'rose', 'amber'];
        const accent = allowedAccents.includes(saved.state?.accentColor) ? saved.state.accentColor : 'forest';
        document.documentElement.dataset.theme = theme;
        document.documentElement.dataset.accent = accent;
        document.documentElement.style.colorScheme = theme;
        document.querySelector('meta[name="theme-color"]').content = theme === 'light' ? '#f4f7f5' : '#101512';
      } catch {
        document.documentElement.dataset.theme = 'light';
      }
    </script>
    <title>FocusFlow | Focus and task planning</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
